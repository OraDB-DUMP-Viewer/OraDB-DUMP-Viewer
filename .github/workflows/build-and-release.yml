name: Build and Release

# ───────────────────────────────────────────
# トリガー: release ブランチへの push 時に実行
# ───────────────────────────────────────────
on:
  push:
    branches:
      - release

jobs:
  # ═══════════════════════════════════════════
  # ビルドジョブ (x64 / ARM64 並列)
  # ═══════════════════════════════════════════
  build:
    name: Build (${{ matrix.arch }})
    runs-on: windows-latest

    strategy:
      matrix:
        include:
          - arch: x64
            rid: win-x64
            msvc_arch: x64
            wix_arch: x64
          - arch: arm64
            rid: win-arm64
            msvc_arch: amd64_arm64
            wix_arch: arm64

    steps:
      # ─────────────────────────────────────
      # 1. ソースコードをチェックアウト
      # ─────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ─────────────────────────────────────
      # 2. .NET SDK のセットアップ (.NET 10)
      # ─────────────────────────────────────
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # ─────────────────────────────────────
      # 3. MSVC 環境セットアップ (C DLL ビルド用)
      # ─────────────────────────────────────
      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.msvc_arch }}

      # ─────────────────────────────────────
      # 4. C ネイティブ DLL ビルド
      #    OraDB_DumpParser.dll を cl.exe で直接ビルド
      # ─────────────────────────────────────
      - name: Build native DLL (OraDB_DumpParser.dll)
        shell: cmd
        working-directory: Logics/DumpParser
        run: |
          set DEFS=/DWINDOWS /DWIN32 /DUTF8 /DODV_DLL_MODE /D_CRT_SECURE_NO_WARNINGS /DNDEBUG
          set CFLAGS=/O2 /W3 /LD /MT /nologo /utf-8 /std:c11
          set SRCS=odv_api.c odv_detect.c odv_expdp.c odv_exp.c odv_record.c odv_number.c odv_datetime.c odv_charset.c odv_xml.c odv_csv.c odv_sql.c
          cl %CFLAGS% %DEFS% /I "." /Fe"OraDB_DumpParser.dll" %SRCS% /link /DLL
          if %ERRORLEVEL% NEQ 0 exit /b 1
          del /q *.obj *.exp *.lib 2>nul
          echo DLL built successfully (${{ matrix.arch }})
          dir OraDB_DumpParser.dll

      # ─────────────────────────────────────
      # 5. バージョン番号を .vbproj から取得
      # ─────────────────────────────────────
      - name: Get version from .vbproj
        id: get_version
        shell: pwsh
        run: |
          [xml]$xml = Get-Content "OraDB DUMP Viewer.vbproj"
          $version = $xml.Project.PropertyGroup `
            | Where-Object { $_.Version } `
            | Select-Object -ExpandProperty Version -First 1
          if (-not $version) { $version = "1.0.0" }
          Write-Host "Version: $version"
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
          echo "TAG=v$version" >> $env:GITHUB_OUTPUT

      # ─────────────────────────────────────
      # 6. NuGet パッケージの復元
      # ─────────────────────────────────────
      - name: Restore dependencies
        run: dotnet restore "OraDB DUMP Viewer.vbproj"

      # ─────────────────────────────────────
      # 7. アプリビルド (Self-contained)
      #    .NET ランタイム同梱
      #    ポータブル版 (ZIP) と MSI で共用
      # ─────────────────────────────────────
      - name: Build application (self-contained)
        run: |
          dotnet publish "OraDB DUMP Viewer.vbproj" `
            --configuration Release `
            --runtime ${{ matrix.rid }} `
            --self-contained true `
            --output ./publish/app

      - name: Copy build output for portable and MSI
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "./publish/portable" -Force | Out-Null
          New-Item -ItemType Directory -Path "./publish/msi" -Force | Out-Null
          Copy-Item -Path "./publish/app/*" -Destination "./publish/portable" -Recurse -Force
          Copy-Item -Path "./publish/app/*" -Destination "./publish/msi" -Recurse -Force

      # ─────────────────────────────────────
      # 8. DLL が出力に含まれていることを検証
      # ─────────────────────────────────────
      - name: Verify native DLL in output
        shell: pwsh
        run: |
          if (-not (Test-Path "./publish/app/OraDB_DumpParser.dll")) {
            Write-Error "OraDB_DumpParser.dll がビルド出力に含まれていません"
            exit 1
          }
          Write-Host "OraDB_DumpParser.dll found in build output (${{ matrix.arch }})"

      # ─────────────────────────────────────
      # 9. ポータブル版を ZIP に圧縮
      # ─────────────────────────────────────
      - name: Zip portable
        shell: pwsh
        run: |
          $version = "${{ steps.get_version.outputs.VERSION }}"
          Compress-Archive `
            -Path "./publish/portable/*" `
            -DestinationPath "./publish/OraDBDumpViewer_v${version}_portable_${{ matrix.arch }}.zip"

      # ─────────────────────────────────────
      # 10. WiX Toolset v5.0.2 のインストール
      # ─────────────────────────────────────
      - name: Install WiX Toolset
        run: dotnet tool install --global wix --version 5.0.2

      # ─────────────────────────────────────
      # 11. WiX UI 拡張を追加
      # ─────────────────────────────────────
      - name: Add WiX UI extension
        run: wix extension add WixToolset.UI.wixext/5.0.2

      # ─────────────────────────────────────
      # 12. WiX ソースファイルの生成
      # ─────────────────────────────────────
      - name: Generate WiX source file
        shell: pwsh
        run: |
          $version = "${{ steps.get_version.outputs.VERSION }}"
          $exeDir = "$env:GITHUB_WORKSPACE\publish\msi"

          $wxs = @"
          <?xml version="1.0" encoding="UTF-8"?>
          <Wix xmlns="http://wixtoolset.org/schemas/v4/wxs"
               xmlns:ui="http://wixtoolset.org/schemas/v4/wxs/ui">

            <Package Name="OraDB DUMP Viewer"
                     Version="${version}"
                     Manufacturer="YANAI Taketo"
                     UpgradeCode="cd3b541d-5df6-4737-9bcc-16a4329a8a54"
                     Codepage="65001"
                     Scope="perMachine"
                     Language="1041">

              <MajorUpgrade DowngradeErrorMessage="A newer version is already installed." />
              <MediaTemplate EmbedCab="yes" />

              <ui:WixUI Id="WixUI_InstallDir" />
              <Property Id="WIXUI_INSTALLDIR" Value="INSTALLFOLDER" />

              <Feature Id="ProductFeature" Title="OraDB DUMP Viewer" Level="1">
                <ComponentGroupRef Id="ProductComponents" />
                <ComponentRef Id="DesktopShortcut" />
                <ComponentRef Id="StartMenuShortcut" />
              </Feature>

              <!-- インストール先フォルダ -->
              <StandardDirectory Id="ProgramFiles64Folder">
                <Directory Id="INSTALLFOLDER" Name="OraDB DUMP Viewer" />
              </StandardDirectory>

              <!-- デスクトップ -->
              <StandardDirectory Id="DesktopFolder">
                <Component Id="DesktopShortcut" Guid="*">
                  <Shortcut Id="DesktopShortcutLink"
                            Name="OraDB DUMP Viewer"
                            Description="OraDB DUMP Viewer"
                            Target="[INSTALLFOLDER]OraDB DUMP Viewer.exe"
                            WorkingDirectory="INSTALLFOLDER" />
                  <RegistryValue Root="HKCU"
                                 Key="Software\YANAI Taketo\OraDB DUMP Viewer"
                                 Name="DesktopShortcut"
                                 Type="integer"
                                 Value="1"
                                 KeyPath="yes" />
                </Component>
              </StandardDirectory>

              <!-- スタートメニュー -->
              <StandardDirectory Id="ProgramMenuFolder">
                <Directory Id="AppStartMenuFolder" Name="OraDB DUMP Viewer">
                  <Component Id="StartMenuShortcut" Guid="*">
                    <Shortcut Id="StartMenuShortcutLink"
                              Name="OraDB DUMP Viewer"
                              Description="OraDB DUMP Viewer"
                              Target="[INSTALLFOLDER]OraDB DUMP Viewer.exe"
                              WorkingDirectory="INSTALLFOLDER" />
                    <RemoveFolder Id="RemoveStartMenuFolder"
                                  Directory="AppStartMenuFolder"
                                  On="uninstall" />
                    <RegistryValue Root="HKCU"
                                   Key="Software\YANAI Taketo\OraDB DUMP Viewer"
                                   Name="StartMenuShortcut"
                                   Type="integer"
                                   Value="1"
                                   KeyPath="yes" />
                  </Component>
                </Directory>
              </StandardDirectory>

              <!-- アプリ本体ファイル -->
              <ComponentGroup Id="ProductComponents" Directory="INSTALLFOLDER">
                <Files Include="${exeDir}\**" />
              </ComponentGroup>

            </Package>
          </Wix>
          "@
          $wxs | Set-Content -Path installer.wxs -Encoding UTF8

      # ─────────────────────────────────────
      # 13. .msi インストーラーのビルド
      # ─────────────────────────────────────
      - name: Build MSI installer
        shell: pwsh
        run: |
          $version = "${{ steps.get_version.outputs.VERSION }}"
          wix build installer.wxs `
            -ext WixToolset.UI.wixext `
            -arch ${{ matrix.wix_arch }} `
            -o "./publish/OraDBDumpViewer_v${version}_installer_${{ matrix.arch }}.msi"

      # ─────────────────────────────────────
      # 14. ビルドアーティファクトをアップロード
      # ─────────────────────────────────────
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.arch }}
          path: |
            ./publish/OraDBDumpViewer_v${{ steps.get_version.outputs.VERSION }}_portable_${{ matrix.arch }}.zip
            ./publish/OraDBDumpViewer_v${{ steps.get_version.outputs.VERSION }}_installer_${{ matrix.arch }}.msi

      - name: Save version info
        shell: pwsh
        run: |
          $version = "${{ steps.get_version.outputs.VERSION }}"
          Set-Content -Path "./publish/version.txt" -Value $version -NoNewline

      - name: Upload version info
        uses: actions/upload-artifact@v4
        with:
          name: version-info-${{ matrix.arch }}
          path: ./publish/version.txt

  # ═══════════════════════════════════════════
  # リリースジョブ (ビルド完了後に統合)
  # ═══════════════════════════════════════════
  release:
    name: Release
    needs: build
    runs-on: windows-latest

    permissions:
      contents: write  # GitHub Release の作成に必要

    steps:
      # ─────────────────────────────────────
      # 1. ソースコードをチェックアウト
      #    (CHANGELOG.md 読み取り用)
      # ─────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ─────────────────────────────────────
      # 2. 全アーキテクチャのアーティファクトをダウンロード
      # ─────────────────────────────────────
      - name: Download x64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-x64
          path: ./artifacts

      - name: Download arm64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-arm64
          path: ./artifacts

      - name: Download version info
        uses: actions/download-artifact@v4
        with:
          name: version-info-x64
          path: ./meta

      # ─────────────────────────────────────
      # 3. バージョン情報を読み取り
      # ─────────────────────────────────────
      - name: Read version
        id: get_version
        shell: pwsh
        run: |
          $version = Get-Content "./meta/version.txt" -Raw
          Write-Host "Version: $version"
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
          echo "TAG=v$version" >> $env:GITHUB_OUTPUT

      # ─────────────────────────────────────
      # 4. CHANGELOG.md からリリースノートを抽出
      # ─────────────────────────────────────
      - name: Extract release notes from CHANGELOG.md
        id: changelog
        shell: pwsh
        run: |
          $version = "${{ steps.get_version.outputs.VERSION }}"

          if (-not (Test-Path "CHANGELOG.md")) {
            Write-Host "CHANGELOG.md が見つかりません。空のリリースノートを使用します。"
            $notes = "No release notes."
          } else {
            $content = Get-Content "CHANGELOG.md" -Raw
            # ## [0.1.2] または ## 0.1.2 の形式に対応
            $escaped = [regex]::Escape($version)
            $pattern = "(?ms)^## \[?${escaped}\]?[^\n]*\n(.*?)(?=\n## |\Z)"
            $match = [regex]::Match($content, $pattern)
            if ($match.Success) {
              $notes = $match.Groups[1].Value.Trim()
              Write-Host "リリースノートを取得しました"
            } else {
              $notes = "No release notes for v${version}."
              Write-Host "該当バージョンのセクションが見つかりませんでした"
            }
          }

          # 複数行を GITHUB_OUTPUT に書き込む
          $delimiter = "EOF_CHANGELOG"
          "NOTES<<$delimiter" | Out-File -Append -Encoding utf8 $env:GITHUB_OUTPUT
          $notes | Out-File -Append -Encoding utf8 $env:GITHUB_OUTPUT
          $delimiter | Out-File -Append -Encoding utf8 $env:GITHUB_OUTPUT

      # ─────────────────────────────────────
      # 5. GitHub Release の作成 & アップロード
      #    x64 + ARM64 の全ファイルをアップロード
      # ─────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.TAG }}
          name: Release ${{ steps.get_version.outputs.TAG }}
          body: ${{ steps.changelog.outputs.NOTES }}
          draft: false
          prerelease: false
          files: |
            ./artifacts/OraDBDumpViewer_v${{ steps.get_version.outputs.VERSION }}_portable_x64.zip
            ./artifacts/OraDBDumpViewer_v${{ steps.get_version.outputs.VERSION }}_installer_x64.msi
            ./artifacts/OraDBDumpViewer_v${{ steps.get_version.outputs.VERSION }}_portable_arm64.zip
            ./artifacts/OraDBDumpViewer_v${{ steps.get_version.outputs.VERSION }}_installer_arm64.msi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ─────────────────────────────────────
      # 6. Winget パッケージマニフェストの自動PR
      #    microsoft/winget-pkgs へ PR を送信
      #    x64 + ARM64 両アーキテクチャのインストーラーを登録
      # ─────────────────────────────────────
      - name: Publish to Winget
        shell: pwsh
        run: |
          $version = "${{ steps.get_version.outputs.VERSION }}"
          $baseUrl = "https://github.com/OraDB-DUMP-Viewer/OraDB-DUMP-Viewer/releases/download/v${version}"

          # 各アーキテクチャの MSI ハッシュを取得
          $msiX64 = "./artifacts/OraDBDumpViewer_v${version}_installer_x64.msi"
          $msiArm64 = "./artifacts/OraDBDumpViewer_v${version}_installer_arm64.msi"
          $hashX64 = (Get-FileHash $msiX64 -Algorithm SHA256).Hash
          $hashArm64 = (Get-FileHash $msiArm64 -Algorithm SHA256).Hash

          # マニフェストディレクトリ作成
          $dir = "manifests/o/OraDBDumpViewer/OraDBDumpViewer/$version"
          New-Item -ItemType Directory -Path $dir -Force

          # バージョンマニフェスト
          @"
          PackageIdentifier: OraDBDumpViewer.OraDBDumpViewer
          PackageVersion: $version
          DefaultLocale: ja-JP
          ManifestType: version
          ManifestVersion: 1.6.0
          "@ -replace '(?m)^          ', '' | Set-Content "$dir/OraDBDumpViewer.OraDBDumpViewer.yaml" -NoNewline

          # インストーラーマニフェスト (x64 + ARM64)
          @"
          PackageIdentifier: OraDBDumpViewer.OraDBDumpViewer
          PackageVersion: $version
          Platform:
          - Windows.Desktop
          MinimumOSVersion: 10.0.17763.0
          InstallerType: msi
          Scope: machine
          InstallModes:
          - interactive
          - silent
          - silentWithProgress
          Installers:
          - Architecture: x64
            InstallerUrl: ${baseUrl}/OraDBDumpViewer_v${version}_installer_x64.msi
            InstallerSha256: $hashX64
          - Architecture: arm64
            InstallerUrl: ${baseUrl}/OraDBDumpViewer_v${version}_installer_arm64.msi
            InstallerSha256: $hashArm64
          ManifestType: installer
          ManifestVersion: 1.6.0
          "@ -replace '(?m)^          ', '' | Set-Content "$dir/OraDBDumpViewer.OraDBDumpViewer.installer.yaml" -NoNewline

          # ロケールマニフェスト
          @"
          PackageIdentifier: OraDBDumpViewer.OraDBDumpViewer
          PackageVersion: $version
          PackageLocale: ja-JP
          Publisher: YANAI Taketo
          PublisherUrl: https://www.odv.dev/
          PackageName: OraDB DUMP Viewer
          PackageUrl: https://www.odv.dev/
          License: Proprietary
          ShortDescription: Oracle EXP/EXPDP DUMPファイルビューア
          Tags:
          - oracle
          - dump
          - viewer
          - database
          ManifestType: defaultLocale
          ManifestVersion: 1.6.0
          "@ -replace '(?m)^          ', '' | Set-Content "$dir/OraDBDumpViewer.OraDBDumpViewer.locale.ja-JP.yaml" -NoNewline

          # wingetcreate で winget-pkgs へ PR 送信
          Invoke-WebRequest -Uri "https://aka.ms/wingetcreate/latest" -OutFile wingetcreate.exe
          .\wingetcreate.exe submit --token "${{ secrets.WINGET_TOKEN }}" $dir
