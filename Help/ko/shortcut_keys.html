<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>키보드 단축키 - OraDB DUMP Viewer</title>
<link rel="stylesheet" href="../style.css">
</head>
<body>

<h1>키보드 단축키</h1>

<h2>파일 작업</h2>
<table>
<tr><th>키</th><th>기능</th></tr>
<tr><td><span class="shortcut">Ctrl+O</span></td><td>덤프 파일 열기</td></tr>
<tr><td><span class="shortcut">Ctrl+Shift+O</span></td><td>워크스페이스 열기</td></tr>
<tr><td><span class="shortcut">Ctrl+S</span></td><td>워크스페이스 저장</td></tr>
</table>

<h2>편집 작업</h2>
<table>
<tr><th>키</th><th>기능</th></tr>
<tr><td><span class="shortcut">Ctrl+Z</span></td><td>실행 취소 (테이블 제외 되돌리기)</td></tr>
<tr><td><span class="shortcut">Ctrl+Y</span></td><td>다시 실행</td></tr>
<tr><td><span class="shortcut">Ctrl+X</span></td><td>잘라내기</td></tr>
<tr><td><span class="shortcut">Ctrl+C</span></td><td>복사</td></tr>
<tr><td><span class="shortcut">Ctrl+V</span></td><td>붙여넣기</td></tr>
<tr><td><span class="shortcut">Ctrl+A</span></td><td>모두 선택</td></tr>
</table>

<h2>테이블 작업</h2>
<table>
<tr><th>키</th><th>기능</th></tr>
<tr><td><span class="shortcut">Delete</span></td><td>선택한 테이블 제외</td></tr>
<tr><td><span class="shortcut">Enter</span></td><td>선택한 테이블 열기 (더블클릭과 동일)</td></tr>
</table>

<h2>도움말</h2>
<table>
<tr><th>키</th><th>기능</th></tr>
<tr><td><span class="shortcut">F1</span></td><td>도움말 열기</td></tr>
</table>

<p><a href="toc.html">목차로 돌아가기</a></p>

</body>
</html>
