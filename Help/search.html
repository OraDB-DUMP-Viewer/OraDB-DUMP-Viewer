<h1>検索・フィルタ</h1>

<h2>テーブル名フィルタ</h2>
<p>ワークスペース上部の検索テキストボックスにテーブル名の一部を入力すると、
リアルタイムでテーブル一覧がフィルタされます。</p>

<ul>
    <li>大文字・小文字は区別しません。</li>
    <li>テーブル名の一部分の入力で部分一致検索されます。</li>
    <li>テキストを空にするとフィルタが解除されます。</li>
</ul>

<h2>選択の反転</h2>
<p>テーブル一覧の選択状態を反転できます。
右クリックメニューの <strong>選択を反転</strong> を使用します。</p>
