<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>ショートカットキー - OraDB DUMP Viewer</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>ショートカットキー</h1>

<h2>ファイル操作</h2>
<table>
<tr><th>キー</th><th>機能</th></tr>
<tr><td><span class="shortcut">Ctrl+O</span></td><td>ダンプファイルを開く</td></tr>
<tr><td><span class="shortcut">Ctrl+S</span></td><td>ワークスペースの保存</td></tr>
</table>

<h2>編集操作</h2>
<table>
<tr><th>キー</th><th>機能</th></tr>
<tr><td><span class="shortcut">Ctrl+Z</span></td><td>元に戻す (テーブル除外の取消)</td></tr>
<tr><td><span class="shortcut">Ctrl+Y</span></td><td>やり直し</td></tr>
<tr><td><span class="shortcut">Ctrl+X</span></td><td>切り取り</td></tr>
<tr><td><span class="shortcut">Ctrl+C</span></td><td>コピー</td></tr>
<tr><td><span class="shortcut">Ctrl+V</span></td><td>貼り付け</td></tr>
<tr><td><span class="shortcut">Ctrl+A</span></td><td>すべて選択</td></tr>
</table>

<h2>テーブル操作</h2>
<table>
<tr><th>キー</th><th>機能</th></tr>
<tr><td><span class="shortcut">Delete</span></td><td>選択テーブルを除外</td></tr>
<tr><td><span class="shortcut">Enter</span></td><td>選択テーブルを開く (ダブルクリックと同等)</td></tr>
</table>

<h2>ヘルプ</h2>
<table>
<tr><th>キー</th><th>機能</th></tr>
<tr><td><span class="shortcut">F1</span></td><td>ヘルプを開く</td></tr>
</table>

<p><a href="toc.html">目次に戻る</a></p>

</body>
</html>
