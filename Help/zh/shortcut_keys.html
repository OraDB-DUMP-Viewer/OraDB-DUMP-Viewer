<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<title>键盘快捷键 - OraDB DUMP Viewer</title>
<link rel="stylesheet" href="../style.css">
</head>
<body>

<h1>键盘快捷键</h1>

<h2>文件操作</h2>
<table>
<tr><th>按键</th><th>功能</th></tr>
<tr><td><span class="shortcut">Ctrl+O</span></td><td>打开转储文件</td></tr>
<tr><td><span class="shortcut">Ctrl+Shift+O</span></td><td>打开工作区</td></tr>
<tr><td><span class="shortcut">Ctrl+S</span></td><td>保存工作区</td></tr>
</table>

<h2>编辑操作</h2>
<table>
<tr><th>按键</th><th>功能</th></tr>
<tr><td><span class="shortcut">Ctrl+Z</span></td><td>撤销（恢复表排除）</td></tr>
<tr><td><span class="shortcut">Ctrl+Y</span></td><td>重做</td></tr>
<tr><td><span class="shortcut">Ctrl+X</span></td><td>剪切</td></tr>
<tr><td><span class="shortcut">Ctrl+C</span></td><td>复制</td></tr>
<tr><td><span class="shortcut">Ctrl+V</span></td><td>粘贴</td></tr>
<tr><td><span class="shortcut">Ctrl+A</span></td><td>全选</td></tr>
</table>

<h2>表操作</h2>
<table>
<tr><th>按键</th><th>功能</th></tr>
<tr><td><span class="shortcut">Delete</span></td><td>排除选中的表</td></tr>
<tr><td><span class="shortcut">Enter</span></td><td>打开选中的表（与双击相同）</td></tr>
</table>

<h2>帮助</h2>
<table>
<tr><th>按键</th><th>功能</th></tr>
<tr><td><span class="shortcut">F1</span></td><td>打开帮助</td></tr>
</table>

<p><a href="toc.html">返回目录</a></p>

</body>
</html>
